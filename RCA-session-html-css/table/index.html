<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Styled Table</title>

<style>
  table {
    width: 60%;
    border-collapse: collapse;
    margin: 40px auto;
  }

  th, td {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
  }

  thead {
    background-color: lightblue;
  }
</style>

</head>

<body>

<section>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>1</td>
        <td>Product A</td>
        <td>First product</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Product B</td>
        <td>Second product</td>
      </tr>

      <tr>
        <td>3</td>
        <td>Product C</td>
        <td>Third product</td>
      </tr>

      <tr>
        <td>4</td>
        <td>Product D</td>
        <td>Fourth product</td>
      </tr>
    </tbody>
  </table>
</section>

</body>
</html>
