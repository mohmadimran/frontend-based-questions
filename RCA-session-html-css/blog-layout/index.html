<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>Blog Layout</title>
  </head>
  <body>
    <section class="container">
      <!-- Header -->
      <header>
        <div class="header-grid">
          <h2>MyBlog</h2>
          <nav>
            <ul>
              <li><a href="#">Home</a></li>
              <li><a href="#">Posts</a></li>
              <li><a href="#">About</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <!-- Sidebar -->
      <aside>
        <h3>Categories</h3>
        <ul>
          <li>Technology</li>
          <li>Design</li>
          <li>Programming</li>
          <li>Business</li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main>
        <div class="post">
          <h3>Blog Post Title</h3>
          <p>This is a placeholder for blog content.</p>
        </div>

        <div class="post">
          <h3>Another Blog Post</h3>
          <p>More placeholder content goes here.</p>
        </div>
      </main>

      <!-- Footer -->
      <footer>
        <p>All rights reserved.</p>
      </footer>
    </section>
  </body>
</html>
